<style>
  @keyframes zpulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(1.7)} }

/**
 * <image-slot> — user-fillable image placeholder.

 * Drop this into a deck, mockup, or page wherever a design needs an image.
 * You control the slot's shape; it sizes to its container by default. When the search_stock_photos tool

 * src (with credit/credit-href); the user can still fill or replace it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded

 * sidecar; keep slot ids distinct across them.

 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          Initial framing baseline: cover | contain.   (default 'cover')
 *                cover starts the image filling the frame (overflow cropped);
 *                contain starts it fully visible (letterboxed). Either way the
 *                user can always pan/scale from there — double-click, or the
 *                Edit control, enters reframe mode (drag to move, scroll or
 *                corner-handles to scale; Escape / click-out commits). The
 *                crop persists alongside the image in the sidecar.

  async function toDataUrl(file, targetW) {

      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);

        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="attr-error" part="attribution-error">' + warnIcon +
        '    <div class="cap">This photo needs attribution</div></div>' +
        '  <div class="loading" part="loading"></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        // Outside .frame, like .spill/.ctl — the frame's overflow:hidden +
        // border-radius/clip-path would cut the credit off on circle/pill/mask.
        // A SPAN, not an <a>: the prescribed Unsplash credit holds two links
        // (photographer + Unsplash), built per-render in _render().
        '<span class="credit" part="credit"></span>' +
        '<div class="spill" popover="manual" data-dc-edit-transparent>' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        // data-dc-edit-transparent: the DC editor's edit-mode picker lets
        // clicks through for chrome marked with it (EDIT_TRANSPARENT_SEL)
        // — without it, Replace/Edit clicks in Edit mode are swallowed by
        // element selection and the controls look dead.
        '<div class="ctl" popover="manual" data-dc-edit-transparent><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="edit" title="Reframe image">Edit</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ctl = root.querySelector('.ctl');
      this._credit = root.querySelector('.credit');
      this._attrError = root.querySelector('.attr-error');
      // Credit clicks open the link, not browse/reframe.
      this._credit.addEventListener('click', (e) => e.stopPropagation());
      this._credit.addEventListener('dblclick', (e) => e.stopPropagation());
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      // Encode-in-flight marker (the owning _ingest generation): while set,
      // the same-src "nothing in flight" clear in _render must not fire —
      // the stored value still points at the OLD image until the encode
      // lands, so that clear would unmask the stale image mid-replace.
      this._swapGen = 0;
      // Render-owned swap in flight: set when _render assigns a new src,
      // cleared only by the img's own load/error (or the empty branch).
      // img.complete CANNOT stand in for this — setting src only QUEUES
      // the current-request swap (a microtask), so synchronously after an
      // assignment, complete still reports the OLD settled request. The
      // pick path does exactly that: the host sets src, credit, and
      // credit-href back-to-back in one task, and renders #2/#3 would
      // read the stale complete === true and drop the mask one render
      // after it was set.
      this._loadPending = false;
      // See _render's empty branch: a transient attribution-error wipe of a
      // showing image must make the follow-up render a replacement (spinner),
      // not a first fill (blank frame).
      this._hidShowing = false;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (!act) return;
        // The hidden controls are opacity-0 but still tabbable — without
        // this gate a keyboard user could drive them on a read-only share
        // link (mirrors the dblclick handler's editable gate).
        if (!this.hasAttribute('data-editable')) return;
        if (act === 'replace') {
          this._exitReframe(true);
          // Host-owned picker (Unsplash modal; it also offers local import).
          this.dispatchEvent(new CustomEvent('image-slot:pick', {
            bubbles: true, composed: true, detail: { id: this.id || null }
          }));
        }
        if (act === 'edit') {
          if (!this._reframes()) return;
          if (this.hasAttribute('data-reframe')) this._exitReframe(true);
          else this._enterReframe();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      // load/error also release the replacement-in-flight mask (via the
      // single discipline in _releaseMask): the swap is only revealed once
      // the new image can actually paint (on error the frame shows its
      // background, same as a fresh slot with a broken src).
      this._img.addEventListener('load', () => {
        this._loadPending = false;
        this._releaseMask(true);
        this._applyView();
      });
      this._img.addEventListener('error', () => {
        this._loadPending = false;
        this._releaseMask(true);
      });
      // Gated only on editable — any filled slot can be repositioned/scaled,
      // regardless of fit. Share links (no writeFile) stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const contain = (this.getAttribute('fit') || 'cover').toLowerCase() === 'contain';
          const base = contain ? Math.min(fw / iw, fh / ih) : Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };
        }
        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        // Stashed so _exitReframe (Escape / outside-click mid-drag) can
        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      // Wheel zoom stays available inside reframe mode as a trackpad nicety —
      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView();
        this._applyView();
      }, { passive: false });
    }

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');
      }
      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);
      this.addEventListener('drop', this);
      subs.add(this._subFn);
      // The host may inject window.omelette.writeFile AFTER the first render;
      // re-render on hover so the editable-gated controls reliably appear.
      this.addEventListener('pointerenter', this._subFn);
      // width%/height% in _applyView encode the frame aspect at call time —
      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()
      // re-seeds _view from stored before clamp/apply, so a shrink→grow
      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());
      this._ro.observe(this);
      load();
      this._render();
    }

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('pointerenter', this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      // commit=false: a disconnect is not a user intent — committing here
      // would persist whatever half-finished drag a React remount or DOM
      // splice happened to interrupt. Deliberate exits commit on their own
      // paths (Escape/click-out/toggle), and unloads commit via pagehide.
      this._exitReframe(false);
    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._signalReframe(true);
      // Best-effort commit when the document unloads mid-reframe (a host
      // navigation racing the enter signal, a manual reload, tab close):
      // the sidecar write rides the host bridge, which outlives this
      // document, so the crop survives even though the mode dies with the
      // DOM. Held on the instance so _exitReframe detaches exactly what
      // was attached.
      this._pagehide = () => { this._exitReframe(true); flushNow(); };
      window.addEventListener('pagehide', this._pagehide);
      // Promote spill to the top layer, then keep it pinned over the frame:
      // scroll/resize cover the common cases, and a per-frame rect check
      // catches layout shifts that fire neither (an image above finishing
      // load, streamed DOM pushing the slot down, an ancestor transform
      // change) so the overlay can't detach from the frame.
      try { this._spill.showPopover(); } catch {}
      // After the spill, so the controls stack above it in the top layer.
      try { this._ctl.showPopover(); } catch {}
      this._reposition = () => { if (this.hasAttribute('data-reframe')) this._applyView(); };
      window.addEventListener('scroll', this._reposition, true);
      window.addEventListener('resize', this._reposition);
      this._lastRect = '';
      this._watch = () => {
        if (!this.hasAttribute('data-reframe')) return;
        const r = this.getBoundingClientRect();
        const key = r.left + ',' + r.top + ',' + r.width + ',' + r.height;
        if (key !== this._lastRect) { this._lastRect = key; this._applyView(); }
        this._watchId = requestAnimationFrame(this._watch);
      };
      this._watchId = requestAnimationFrame(this._watch);
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (this._reposition) {
        window.removeEventListener('scroll', this._reposition, true);
        window.removeEventListener('resize', this._reposition);
        this._reposition = null;
      }
      if (this._watchId) { cancelAnimationFrame(this._watchId); this._watchId = 0; }
      if (this._pagehide) {
        window.removeEventListener('pagehide', this._pagehide);
        this._pagehide = null;
      }
      try { this._spill.hidePopover(); } catch {}
      try { this._ctl.hidePopover(); } catch {}
      this._ctl.style.left = ''; this._ctl.style.top = '';
      if (commit) this._commitView();
      this._signalReframe(false);
    }

    // Reframe state lives only in this DOM until commit, invisible to the
    // host's dirty signals — announce enter/exit so the host can hold
    // auto-reloads for exactly the gesture (the guest bundle forwards
    // image-slot:reframe to the host as imageSlotReframe). Dispatched on
    // the element (composed, so it escapes shadow roots) while connected;
    // a disconnected exit (disconnectedCallback) falls back to document so
    // the host still hears it.
    _signalReframe(active) {
      const target = this.isConnected ? this : document;
      target.dispatchEvent(new CustomEvent('image-slot:reframe', {
        bubbles: true, composed: true,
        detail: { active: active, id: this.id || null }
      }));
    }

    // Public: host's "Import from computer" calls this to run local browse.
    openFilePicker() { this._exitReframe(true); this._input.click(); }

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        // Without preventDefault the browser never fires 'drop'.
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        // dragenter/leave fire for every descendant crossing — count depth
        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }
    }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      // Replacing a shown image: surface the swap through the encode too,
      // not just the decode — otherwise the old photo sits there with no
      // feedback while the canvas re-encode runs. An empty slot keeps its
      // placeholder (no spinner) until the encode lands, as before.
      // _swapGen guards the mask against re-renders DURING the encode
      // (pointerenter, ResizeObserver, another slot's store write): the
      // stored value still resolves to the old image there, so _render's
      // same-src clear would otherwise unmask it mid-replace.
      if (this.hasAttribute('data-filled')) {
        this.setAttribute('data-swapping', '');
        this._swapGen = gen;
      }
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        // Clear BEFORE setSlot: its synchronous re-render must see no
        // pending encode, so a byte-identical re-upload (same data URL, no
        // load event coming) still clears the mask via the complete branch.
        this._swapGen = 0;
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._swapGen = 0;
        // Reveal the kept old image — unless another replacement (a
        // remote pick's src swap) is still in flight, in which case the
        // mask stays until THAT image settles (its load/error releases).
        this._releaseMask();
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is available on any filled slot — the user can
    // always reposition/scale. `fit` only sets the initial baseline (see
    // _geom): contain starts fully-visible, cover starts frame-filling.
    _reframes() {
      return this.hasAttribute('data-filled');
    }

    // The single release discipline for the replacement-in-flight mask
    // (data-swapping). The mask comes off only when BOTH hold:
    //  - no encode is pending (_swapGen) — mid-encode the stored value
    //    still resolves to the old image, so any reveal paints it;
    //  - the frame img has settled on its current src — an unsettled src
    //    means some replacement is still in flight (e.g. a remote pick),
    //    whoever started it, and revealing would paint the previous
    //    frame. The load/error listeners pass settled=true (the event IS
    //    the settlement signal, per spec complete is true by then);
    //    other callers rely on the complete flag (covers loaded AND
    //    failed).
    // Every release path funnels through here EXCEPT _render's empty
    // branch (the img is being cleared — nothing will ever settle).
    _releaseMask(settled) {
      if (
        !this._swapGen &&
        !this._loadPending &&
        (settled || this._img.complete)
      ) {
        this.removeAttribute('data-swapping');
      }
    }

    // Baseline geometry, shared by clamp/apply/resize. `base` is the scale at
    // view-scale s=1: cover = fill the frame (overflow on the looser axis),
    // contain = fit fully inside (letterboxed). Zooming a contain image past
    // s where it overflows naturally becomes a crop. Null until the img has
    // loaded (naturalWidth is 0 before that) or when the slot has no layout
    // box — ResizeObserver fires with a 0×0 rect under display:none, and
    // clamping against a degenerate 1×1 frame would silently pull the stored
    // pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      const contain = (this.getAttribute('fit') || 'cover').toLowerCase() === 'contain';
      const base = contain
        ? Math.min(fw / iw, fh / ih)
        : Math.max(fw / iw, fh / ih);
      return { iw, ih, fw, fh, base };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      // Top-layer controls: pin to the frame's top-right in viewport px
      // (the same 8px inset as the in-frame layout; unscaled — top-layer UI
      // reads as chrome, not page content). BEFORE the geometry branch:
      // placement needs only the frame rect, and a not-yet-loaded or broken
      // src must not leave the promoted strip floating unpositioned. Gated
      // on the popover actually being open: without the Popover API,
      // showPopover() threw (swallowed in _enterReframe), .ctl stays in
      // its in-frame absolute layout, and viewport-px coordinates would
      // shove it off-frame — and matches(':popover-open') itself throws
      // there (unknown pseudo-class), hence the try/catch.
      if (this.hasAttribute('data-reframe')) {
        let onTop = false;
        try { onTop = this._ctl.matches(':popover-open'); } catch {}
        if (onTop) {
          const r = this.getBoundingClientRect();
          this._ctl.style.left = (r.right - 8) + 'px';
          this._ctl.style.top = (r.top + 8) + 'px';
        }
      }
      if (!g) {
        // Dimensions not known yet (before img load) — centered fit so there
        // is no flash of an unpositioned image before the geometry lands.
        const contain = (this.getAttribute('fit') || 'cover').toLowerCase() === 'contain';
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = contain ? 'contain' : 'cover';
        return;
      }
      // Baseline (cover-fill or contain-fit) × view scale. Width/height and
      // left/top are all frame-% — depends only on the frame aspect ratio, so
      // a responsive resize keeps the same crop. The spill layer mirrors the
      // same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      if (this.hasAttribute('data-reframe')) {
        // Top-layer spill: position in viewport px over the frame. The top
        // layer escapes ancestor transforms entirely, so EVERY term must be
        // in viewport units: getBoundingClientRect gives the frame's scaled
        // origin AND size, and the rect/layout ratio rescales the ghost —
        // sizing from layout px alone renders it 1/scale too large under a
        // scaled deck slide. Inner ghost + handles stay box-relative.
        const r = this.getBoundingClientRect();
        const sx = g.fw ? r.width / g.fw : 1;
        const sy = g.fh ? r.height / g.fh : 1;
        this._spill.style.width = (g.iw * k * sx) + 'px';
        this._spill.style.height = (g.ih * k * sy) + 'px';
        this._spill.style.left = (r.left + (50 + this._view.x) / 100 * r.width) + 'px';
        this._spill.style.top = (r.top + (50 + this._view.y) / 100 * r.height) + 'px';
      }
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      // Don't clobber an in-flight reframe with a store-triggered re-render.
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      // An Unsplash src with no credit attribute must NOT render — showing
      // the photo uncredited is the Unsplash-terms violation itself. The
      // error tile replaces the photo until the credit is written. A
      // user-dropped image is the user's own content and always renders.
      // Trimmed: credit is agent/user-editable content, and a whitespace-
      // only value must count as missing — otherwise it would suppress the
      // error tile AND render an empty credit box (no text, no links),
      // exactly the unattributed state this gate exists to prevent.
      const credit = (this.getAttribute('credit') || '').trim();
      const attrError = !!(
        !credit && !this._userUrl && srcAttr && isUnsplashHost(srcAttr)
      );
      this.toggleAttribute('data-attribution-error', attrError);
      if (url && !attrError) {
        const prev = this._img.getAttribute('src');
        if (prev !== url) {
          // Replacing an already-shown image: mark the swap BEFORE setting
          // src so the stale frame is never revealed (see the data-swapping
          // stylesheet rules). First fill (prev empty) keeps the existing
          // placeholder-until-load behavior — no spinner. _hidShowing
          // covers the pick path's transient attribution-error wipe: prev
          // is gone, but an image WAS showing, so this is a replacement.
          if (prev || this._hidShowing) this.setAttribute('data-swapping', '');
          // Mark the swap BEFORE assigning src: complete keeps reporting
          // the old settled request until the browser's
          // update-the-image-data microtask runs, so same-task re-renders
          // (the pick path's credit/credit-href setAttributes) need this
          // flag, not complete, to know a load is in flight.
          this._loadPending = true;
          this._img.src = url;
          this._ghost.src = url;
        } else {
          // Same-src re-render — release if settled, so an ingest-set
          // spinner can't stick after a byte-identical re-upload (same
          // data URL, no further load event ever fires).
          this._releaseMask();
        }
        this._hidShowing = false;
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this.removeAttribute('data-swapping');
        // The src is being removed — no load/error will ever fire for it.
        this._loadPending = false;
        // A transient attribution-error wipe of a showing image happens on
        // the pick path: the host sets src one setAttribute before credit,
        // so render N hides the old image (attrError) and render N+1
        // restores a URL. Remember the wipe so that restore renders as a
        // replacement (spinner), not a first fill (blank frame).
        this._hidShowing = attrError && !!this._img.getAttribute('src');
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        // The error tile owns the blocked-photo state; .empty stays for
        // the genuinely-empty slot.
        this._empty.style.display = attrError ? 'none' : 'flex';
        this.removeAttribute('data-filled');
      }

      // Credit belongs to the author src, so a user drop hides it.
      // textContent + the http(s)-only funnel keep external strings inert.
      const showCredit = !!(url && credit && !this._userUrl && !attrError);
      this._credit.textContent = '';
      if (showCredit) {
        // Validate once (resolved against the document, http(s) only),
        // then append the terms-required utm referral params to links
        // that point back at unsplash.com.
        let href = '';
        const rawHref = this.getAttribute('credit-href') || '';
        if (rawHref) {
          try {
            const u = new URL(rawHref, document.baseURI);
            if (u.protocol === 'http:' || u.protocol === 'https:') {
              href = withReferral(u.href);
            }
          } catch {}
        }
        const mkLink = (text, linkHref) => {
          const a = document.createElement('a');
          a.setAttribute('target', '_blank');
          a.setAttribute('rel', 'noopener noreferrer');
          a.setAttribute('href', linkHref);
          a.textContent = text;
          return a;
        };
        // Unsplash's prescribed credit is TWO links — the photographer's
        // name to their profile (credit-href) and 'Unsplash' to the
        // homepage. Render that split whenever the text has the canonical
        // shape; other text keeps the legacy single-link rendering.
        const m = /^Photo by (.+) on Unsplash$/.exec(credit);
        if (m) {
          this._credit.appendChild(document.createTextNode('Photo by '));
          this._credit.appendChild(
            href ? mkLink(m[1], href) : document.createTextNode(m[1])
          );
          this._credit.appendChild(document.createTextNode(' on '));
          this._credit.appendChild(mkLink('Unsplash', UNSPLASH_HOMEPAGE_HREF));
        } else if (href) {
          this._credit.appendChild(mkLink(credit, href));
        } else {
          this._credit.textContent = credit;
        }
      }
      this.toggleAttribute('data-credit', showCredit);
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();

</script>
<script src="/vendor/niivue.umd.js"></script>
<script>

const el = React.createElement;
const C = { clay:'#C96442', claySoft:'#F0DACF', clayDeep:'#A94E30', green:'#12936A', greenEdge:'#1BA97A', greenSoft:'#DCF0E7', gold:'#C08415', goldEdge:'#D69A1F', gray:'#B0ABA1', grayEdge:'#CBC7BC', ink:'#26241F', ink2:'#5B584F', mute:'#8A877D', edge:'#E6E3D8', edge2:'#D9D5C7', paper2:'#EFEDE4', card:'#FFFFFF' };
const RADIUS = { root:24, green:19, gold:19, gray:15, clay:30 };
const FILL = { green:C.green, gold:C.gold, gray:C.gray };

function interpolateZoom(p0, p1){
  const rho=1.42, rho2=rho*rho, rho4=rho2*rho2, eps=1e-9;
  const ux0=p0[0],uy0=p0[1],w0=p0[2], ux1=p1[0],uy1=p1[1],w1=p1[2];
  const dx=ux1-ux0, dy=uy1-uy0, d2=dx*dx+dy*dy; let i,S;
  if(d2<eps){ S=Math.abs(Math.log(w1/w0))/rho; i=function(t){ return [ux0+t*dx, uy0+t*dy, w0*Math.exp(rho * (Math.log(w1/w0)>=0?1:-1) * t*S)]; }; }
  else{
    const d1=Math.sqrt(d2);
    const b0=(w1*w1-w0*w0+rho4*d2)/(2*w0*rho2*d1);
    const b1=(w1*w1-w0*w0-rho4*d2)/(2*w1*rho2*d1);
    const r0=Math.log(Math.sqrt(b0*b0+1)-b0);
    const r1=Math.log(Math.sqrt(b1*b1+1)-b1);
    S=(r1-r0)/rho;
    i=function(t){ const s=t*S, ch0=Math.cosh(r0), u=w0/(rho2*d1)*(ch0*Math.tanh(rho*s+r0)-Math.sinh(r0)); return [ux0+u*dx, uy0+u*dy, w0*ch0/Math.cosh(rho*s+r0)]; };
  }
  i.S = S;
  return i;
}

// BrainViewer — a live NiiVue (WebGL2) volume render of a REAL structural T1
// (bundled MNI152), replacing the earlier synthetic point-cloud "glass brain".
// Owns one Niivue instance: loads the volume once, switches between a 3D volume
// render and a multiplanar (three ortho slices) view, and flies the crosshair to
// a region-of-interest's MNI coordinate when one is selected. WebGL context is
// released on unmount so tab/node churn can't exhaust the browser's context pool.
class BrainViewer extends React.Component {
  componentDidMount(){ this._mount(); }
  async _mount(){
    const NV = window.niivue;
    if(!NV || !NV.Niivue || !this.canvas){ this._failed=true; this.host&&this.forceUpdate(); return; }
    try {
      const nv = new NV.Niivue({
        backColor:[0.086,0.078,0.070,1],          // matches the recessed --ink viewport
        show3Dcrosshair:true,
        crosshairColor:[0.23,0.51,0.96,1],           // blue — standard NiiVue crosshair; pops against the warm attention overlay
        crosshairWidth:1,
        isColorbar:false,
        textHeight:0.028,
        isOrientCube:false,
        isRadiologicalConvention:false,
      });
      this.nv = nv;
      nv.attachToCanvas(this.canvas);
      nv.opts.multiplanarShowRender = (NV.SHOW_RENDER ? NV.SHOW_RENDER.ALWAYS : 1);
      await this._loadVolumes();
      this._loaded = true;
      this._applyMode();
      this._applyFly();
    } catch(e){ this._failed=true; console.error('[BrainViewer] init failed', e); }
    this.host && this.forceUpdate();
  }
  async _loadVolumes(){
    const nv=this.nv; if(!nv) return;
    // NiiVue infers the format from a filename extension, and the proxy volume
    // URLs carry none — so always pass an explicit `name` ending in .nii.gz.
    const vols=[{ url:this.props.volumeUrl||'/scans/mni152.nii.gz', name:'base.nii.gz', colormap:'gray' }];
    const ov=this.props.overlay;
    if(ov && (ov.kind==='mask'||ov.kind==='heatmap') && ov.url){
      const o={ url:ov.url, name:'overlay.nii.gz', colormap:ov.colormap||(ov.kind==='mask'?'red':'warm'), opacity:(ov.opacity!=null?ov.opacity:0.5) };
      if(ov.cal_min!=null) o.cal_min=ov.cal_min;
      if(ov.cal_max!=null) o.cal_max=ov.cal_max;
      if(ov.alphaThreshold) o.alphaThreshold=true;   // only the masked voxels tint (teammate's technique)
      vols.push(o);
    }
    await nv.loadVolumes(vols);
    if(ov && ov.kind==='mesh' && ov.url && nv.loadMeshes){
      try { await nv.loadMeshes([{ url:ov.url, name:'overlay.obj', rgba255:(ov.rgba? ov.rgba.map(x=>Math.round(x*255)) : [90,220,130,255]) }]); } catch(e){}
    }
    this._loadedKey = (this.props.volumeUrl||'')+ '|' + JSON.stringify(this.props.overlay||null);
  }
  _applyMode(){
    const nv=this.nv; if(!nv) return;
    if((this.props.mode||'render')==='multi') nv.setSliceType(nv.sliceTypeMultiplanar);
    else nv.setSliceType(nv.sliceTypeRender);
  }
  _applyFly(){
    const nv=this.nv, mm=this.props.flyMm;
    if(!nv || !mm || !nv.volumes || !nv.volumes.length) return;
    try {
      const frac = nv.mm2frac(mm);
      nv.scene.crosshairPos = frac;
      nv.createOnLocationChange && nv.createOnLocationChange();
      nv.drawScene();
    } catch(e){ /* pre-load fly requests are harmless no-ops */ }
  }
  componentDidUpdate(prev){
    if(!this.nv || !this._loaded) return;
    const key=(this.props.volumeUrl||'')+'|'+JSON.stringify(this.props.overlay||null);
    if(key!==this._loadedKey){
      // Base volume or overlay changed (e.g. loading a flagged scan) — reload.
      this._loadVolumes().then(()=>{ this._applyMode(); this._applyFly(); this.forceUpdate(); }).catch(()=>{});
      return;
    }
    if(prev.mode!==this.props.mode) this._applyMode();
    if(String(prev.flyMm)!==String(this.props.flyMm)) this._applyFly();
  }
  componentWillUnmount(){
    try { const gl=this.nv&&this.nv.gl; const lose=gl&&gl.getExtension('WEBGL_lose_context'); lose&&lose.loseContext(); } catch(e){}
    this.nv=null;
  }
  render(){
    const h=(this.props.height||236);
    return el('div',{ref:c=>this.host=c, style:{position:'relative',width:'100%',height:h+'px',background:'#16150F'}}, [
      el('canvas',{key:'cv', ref:c=>this.canvas=c, style:{width:'100%',height:h+'px',display:'block',touchAction:'none',cursor:'grab'}}),
      this._failed ? el('div',{key:'err',style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',textAlign:'center',color:'rgba(255,255,255,.66)',fontSize:'12px',padding:'0 20px',lineHeight:1.5}},'Live 3D viewer needs WebGL2 — unavailable in this browser.') : null
    ]);
  }
}

// ---- 3Dmol.js loader: inject the vendored viewer <script> exactly once, guarded.
// Never throws; on any load failure it calls back with null so callers fall back.
const VENDORED_STRUCTURES = ['APP','MAPT','APOE','PSEN1','BACE1','ESR1'];
function get3Dmol(){ try{ return window.$3Dmol || window['3Dmol'] || null; }catch(e){ return null; } }
function ensure3Dmol(cb){
  try {
    const existing = get3Dmol();
    if (existing) return cb(existing);
    if (window.__zui3dmolState === 'error') return cb(null);
    window.__zui3dmolCbs = window.__zui3dmolCbs || [];
    window.__zui3dmolCbs.push(cb);
    if (window.__zui3dmolState === 'loading') return;
    window.__zui3dmolState = 'loading';
    const s = document.createElement('script');
    s.src = '/vendor/3Dmol-min.js';
    s.async = true;
    const flush = ()=>{ const mod = get3Dmol(); window.__zui3dmolState = mod ? 'ready' : 'error'; const cbs = window.__zui3dmolCbs || []; window.__zui3dmolCbs = []; cbs.forEach(f=>{ try{ f(mod); }catch(e){} }); };
    s.onload = flush;
    s.onerror = ()=>{ window.__zui3dmolState = 'error'; const cbs = window.__zui3dmolCbs || []; window.__zui3dmolCbs = []; cbs.forEach(f=>{ try{ f(null); }catch(e){} }); };
    document.head.appendChild(s);
  } catch(e){ try{ cb(null); }catch(_){} }
}

// AlphaFold pLDDT confidence bands (per-residue b-factor → blue=high, orange=low).
function plddtColor(b){
  if (b > 90) return '#0053D6';   // very high
  if (b > 70) return '#65CBF3';   // confident
  if (b > 50) return '#FFDB13';   // low
  return '#FF7D45';               // very low
}

// In-demo 3D structure viewer for the top ranked target. Payoff of the ranked-targets
// card. MUST degrade gracefully: any missing asset / WebGL failure / fetch error falls
// back to the plain pLDDT bar + link (rendered by the parent via props.fallback).
class StructViewer extends React.Component {
  constructor(p){ super(p); this.state = { status:'loading' }; this._dead = false; }
  componentDidMount(){ try{ this._mount(); }catch(e){ this._fail(); } }
  componentWillUnmount(){
    this._dead = true;
    try { if (this.host && this._wheelHandler) this.host.removeEventListener('wheel', this._wheelHandler, {passive:false}); } catch(e){}
    try { if (this._viewer){ if (this._viewer.spin) this._viewer.spin(false); if (this._viewer.clear) this._viewer.clear(); } } catch(e){}
    this._viewer = null;
  }
  // Keep wheel-zoom INSIDE the structure viewer: 3Dmol reads the wheel delta to
  // zoom the model but never preventDefaults, so the wheel also scrolls/zooms the
  // page. A non-passive wheel listener on the host cancels the page default (incl.
  // ctrl+wheel pinch-zoom) while 3Dmol still receives the event for its own zoom.
  _lockWheel(){
    if (!this.host || this._wheelHandler) return;
    this._wheelHandler = (e)=>{ e.preventDefault(); };
    this.host.addEventListener('wheel', this._wheelHandler, {passive:false});
  }
  _fail(){ if (!this._dead) this.setState({ status:'failed' }); }
  _mount(){
    const gene = (this.props.gene||'').toUpperCase();
    if (VENDORED_STRUCTURES.indexOf(gene) < 0) return this._fail();
    // Feature-detect WebGL before touching 3Dmol.
    try {
      const canary = document.createElement('canvas');
      const gl = canary.getContext('webgl') || canary.getContext('experimental-webgl');
      if (!gl) return this._fail();
    } catch(e){ return this._fail(); }
    ensure3Dmol(($3Dmol)=>{
      if (this._dead) return;
      if (!$3Dmol || !this.host) return this._fail();
      let ctrl = null; try{ ctrl = (typeof AbortController!=='undefined') ? new AbortController() : null; }catch(e){}
      const to = setTimeout(()=>{ try{ ctrl && ctrl.abort(); }catch(e){} }, 12000);
      fetch('/structures/'+gene+'.cif', { signal: ctrl?ctrl.signal:undefined })
        .then(r=>{ if(!r.ok) throw new Error('http '+r.status); return r.text(); })
        .then(cif=>{
          clearTimeout(to);
          if (this._dead || !this.host) return;
          try {
            const viewer = $3Dmol.createViewer(this.host, { backgroundColor:'#16150F', antialias:true });
            this._viewer = viewer;
            this._lockWheel();
            viewer.addModel(cif, 'cif');
            viewer.setStyle({}, { cartoon:{ colorfunc:(atom)=>plddtColor(atom.b) } });
            viewer.zoomTo();
            viewer.render();
            try { viewer.zoom(1.15, 600); viewer.spin('y', 0.4); } catch(e){}
            this.setState({ status:'ready' });
          } catch(e){ this._fail(); }
        })
        .catch(()=>{ clearTimeout(to); this._fail(); });
    });
  }
  _boltzLine(){
    const bt = this.props.boltz;
    if (!bt || bt.iptm==null) return null;
    const pair = [bt.gene_a, bt.gene_b].filter(Boolean).join('·') || 'complex';
    return el('div',{key:'bz',style:{marginTop:'8px',display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:'10px',fontSize:'11px',color:C.ink2,lineHeight:1.4}},[
      el('span',{key:'l'},[ el('b',{key:'p',style:{fontWeight:600,color:C.ink}}, pair), ' interface confidence ', el('span',{key:'s',style:{color:C.mute}},'(Boltz-2, no coordinates)') ]),
      el('span',{key:'v',style:{fontFamily:'ui-monospace,SFMono-Regular,Menlo,Consolas,monospace',color:C.ink,fontWeight:600}}, 'iPTM '+(+bt.iptm).toFixed(2))
    ]);
  }
  render(){
    if (this.state.status === 'failed') {
      // Graceful fallback: the exact pre-existing pLDDT bar + link, plus the honest Boltz scalar.
      return el('div',{}, [ this.props.fallback, this._boltzLine() ]);
    }
    const plddt = this.props.plddt;
    const mono = 'ui-monospace,SFMono-Regular,Menlo,Consolas,monospace';
    return el('div',{key:'sv',style:{marginTop:'12px'}},[
      el('div',{key:'host',ref:(c)=>{ this.host = c; },style:{position:'relative',width:'100%',height:'220px',borderRadius:'10px',overflow:'hidden',background:'#16150F',border:'1px solid '+C.edge}},
        this.state.status==='loading' ? el('div',{key:'ld',style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,.55)',fontSize:'12px'}},'Loading structure…') : null
      ),
      el('div',{key:'lg',style:{marginTop:'8px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'10px',flexWrap:'wrap'}},[
        el('div',{key:'sc',style:{display:'flex',alignItems:'center',gap:'6px'}},[
          el('span',{key:'a',style:{fontSize:'10px',color:C.mute}},'pLDDT'),
          el('span',{key:'b',style:{width:'56px',height:'7px',borderRadius:'4px',background:'linear-gradient(90deg,#FF7D45,#FFDB13,#65CBF3,#0053D6)'}}),
          el('span',{key:'c',style:{fontSize:'10px',color:C.mute}},'low → high'),
          plddt!=null ? el('span',{key:'d',style:{fontSize:'11px',fontFamily:mono,color:C.ink,marginLeft:'2px'}},'mean '+plddt.toFixed(1)) : null
        ]),
        this.props.modelUrl ? el('a',{key:'ln',href:this.props.modelUrl,target:'_blank',rel:'noopener',style:{fontSize:'11px',fontFamily:mono,color:C.clayDeep}}, (this.props.uniprot||'model')+' →') : null
      ]),
      el('div',{key:'cap',style:{marginTop:'6px',fontSize:'11px',lineHeight:1.4,color:C.ink2}},'Real AlphaFold DB structure, colored by per-residue confidence (pLDDT).'),
      this._boltzLine()
    ]);
  }
}

// Live target grounding from the Open Targets Platform GraphQL API. Fetches the
// lead gene's REAL Alzheimer-disease association score + small-molecule
// tractability buckets, and links to the OT target page + a literature search.
// Honest by construction: renders the OT block ONLY when the live fetch succeeds;
// on any failure it returns null and the card falls back to the AlphaFold/UniProt
// links already shown — it never fabricates OT data.
const OT_ENSEMBL = { APP:'ENSG00000142192', ESR1:'ENSG00000091831', MAPT:'ENSG00000186868', APOE:'ENSG00000130203', PSEN1:'ENSG00000080815', BACE1:'ENSG00000186318' };
const OT_QUERY = 'query($ens:String!){ target(ensemblId:$ens){ approvedSymbol tractability{ label modality value } associatedDiseases(page:{index:0,size:60}){ rows{ disease{ name } score } } } }';
class OTGrounding extends React.Component {
  constructor(p){ super(p); this.state = { status:'loading', ad:null, tract:[] }; this._dead = false; }
  componentWillUnmount(){ this._dead = true; try{ this._ctrl && this._ctrl.abort(); }catch(e){} }
  componentDidMount(){
    const ens = this.props.ens;
    if (!ens) { this.setState({ status:'fail' }); return; }
    let ctrl = null; try{ ctrl = new AbortController(); this._ctrl = ctrl; }catch(e){}
    const to = setTimeout(()=>{ try{ ctrl && ctrl.abort(); }catch(e){} }, 8000);
    fetch('https://api.platform.opentargets.org/api/v4/graphql', {
      method:'POST', headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ query: OT_QUERY, variables:{ ens: ens } }),
      signal: ctrl ? ctrl.signal : undefined
    })
      .then(r=>{ if(!r.ok) throw new Error('http '+r.status); return r.json(); })

  // Push the real case onto the fixed-topology tree: candidate counts + the

  // confound-branch subtitles carry the real gauntlet stats (scanner AUC, age-

  // gauntlet KILLS greys its survivor pathways and its candidate leaves, instead
  // of always showing the promoted happy-path picture. No fabricated numbers:
  // every value is read from sv (case) tests[]/translation.
  _applyCaseToTree(sv){
    if(!sv) return;
    const tx=sv.translation||{};
    const nB=Math.min(3, (tx.ranked_targets||[]).length);
    const nC=(tx.repurposing||[]).length;
    const nE=tx.wet_lab_experiment?1:0;
    const plur=(n,w)=> n+' '+w+(n===1?'':'s');

    const scanT=byK['site_scanner'];

  };

  setCanvas = (elm)=>{

    const interp=interpolateZoom(p0,p1);
    const dur = Math.max(420, Math.min(2600, Math.abs(interp.S)*760 + 260));
    const t0=performance.now();
    const tick=(now)=>{
      let t=(now-t0)/dur; if(t>=1) t=1;

  // ---- biomarker-anchor + hypothesis composer (inline mini-widget) ----
  toggleComposer=()=>this.setState({composerOpen:!this.state.composerOpen});
  toggleStruct=()=>this.setState({structOpen:!this.state.structOpen});
  selectTarget=(g)=>this.setState({selectedTarget:g});
  clearTarget=()=>this.setState({selectedTarget:null});
  // Top-ranked target's gene, read straight from the case's translation (tx.top_target,
  // falling back to ranked_targets[0]) — never a literal gene name. Used to auto-open the
  // AlphaFold structure the moment the Protein-data tab becomes active.
  topTargetGene(){
    const tx=this.heroTx()||{}; const rt=tx.ranked_targets||[];
    if(!rt.length) return null;
    const lead=(tx.top_target&&rt.find(t=>t&&t.gene===tx.top_target))||rt[0];
    return (lead&&lead.gene)||null;
  }
  setComposerBiomarker=(e)=>this.setState({composerBiomarker:e.target.value});
  setComposerDraft=(e)=>this.setState({composerDraft:e.target.value});
  onComposerKey=(e)=>{ if(e.key==='Enter'){ e.preventDefault(); this.onComposerSubmit(); } };
  // Human-readable summary that FOREGROUNDS the chosen biomarker's already-computed
  // anchor from the loaded case (never re-derives it). Region is surfaced as the
  // existing attribution OUTPUT — not an input that would change the computation.
  anchorFocusSummary(bm){
    const c=this.heroCase(); const t=(c&&c.tests||[]).find(x=>x.key==='biomarker_anchor'); const s=(t&&t.stats)||{};
    const path=this.pathwayLabel({}); // survivor default → medial-temporal signature (output attribution)
    const region=(this.brainRegions({})[0]||{}).l||'medial-temporal cortex';
    const tail=' Attribution localizes to the '+path.toLowerCase()+' ('+region+') — surfaced as an output of the attentive probe, not an input.';
    if(!t || t.result==='not_available'){
      return 'No plasma p-tau217 / GFAP / amyloid coverage in this cohort, so the '+this.fmtBiomarker(bm)+' anchor is N/A here — route to ADNI/EPAD to anchor.'+tail;
    }
    if(bm==='amyloid'){
      if(s.amyloid_delta==null) return 'Amyloid anchor is N/A for this cohort.'+tail;
      return 'Amyloid-positivity enrichment: probe score Δ +'+(+s.amyloid_delta).toFixed(2)+' higher in amyloid+ vs amyloid− (point-biserial r '+(+s.amyloid_point_biserial_r).toFixed(2)+', 95% CI ≥ '+(+s.amyloid_ci_lo).toFixed(2)+', n='+s.amyloid_n+'). Binary positivity enrichment, not a Pearson r.'+tail;
    }
    if(bm==='p_tau217'){
      if(s.ptau217_r==null) return 'p-tau217 anchor is N/A for this cohort.'+tail;
      return 'p-tau217 anchor: r +'+(+s.ptau217_r).toFixed(2)+' (95% CI ≥ '+(+s.ptau217_ci_lo).toFixed(2)+', n='+s.ptau217_n+') — the dominant molecular anchor for this survivor.'+tail;
    }
    if(bm==='gfap'){
      if(s.gfap_r==null) return 'GFAP anchor is N/A for this cohort.'+tail;
      return 'GFAP astrocyte anchor: r +'+(+s.gfap_r).toFixed(2)+' (95% CI ≥ '+(+s.gfap_ci_lo).toFixed(2)+', n='+s.gfap_n+') — secondary to p-tau217 on this branch.'+tail;
    }
    // NfL: not separately computed in this cohort — stay honest.
    return 'NfL was not separately anchored for this cohort; the computed anchors here are p-tau217 (r +'+(s.ptau217_r!=null?(+s.ptau217_r).toFixed(2):'—')+') and amyloid positivity (Δ +'+(s.amyloid_delta!=null?(+s.amyloid_delta).toFixed(2):'—')+').'+tail;
  }
  onComposerSubmit=()=>{
    const hyp=(this.state.composerDraft||'').trim(); if(!hyp) return;
    if(this.state.substrate==='oasis') return; // no plasma → guarded by UI too
    const bm=this.state.composerBiomarker||'p_tau217';
    const summary=this.anchorFocusSummary(bm);
    this.setState(s=>({
      entryValue:hyp, anchorFocus:bm, railOpen:true, composerOpen:false, composerDraft:'',
      chatMsgs:s.chatMsgs.concat([{role:'user',text:hyp+'  ·  anchor: '+this.fmtBiomarker(bm)},{role:'assistant',text:summary}])
    // Fire the SAME real investigation the chat/entry uses; grows the tree + hits
    // /api/investigate. Called in the setState callback so anchorFocus is committed
    // before onInvestigate reads it for the POST body.
    }), ()=>this.onInvestigate(hyp));
  };
  setEntry=(e)=>this.setState({entryValue:e.target.value});
  onChatKey=(e)=>{ if(e.key==='Enter'){ e.preventDefault(); this.onChatSend(); } };

  onChatSend=()=>{
    const q=(this.state.chatDraft||'').trim(); if(!q) return;
    const n=this.state.extra.length;
    const id='f'+n;
    const node={ id, x:1180, y:1130+n*150, role:'gold', label:q.length>34?q.slice(0,32)+'…':q, sub:'Claude · follow-up' };
    // Spawn the gold offshoot locally (visual), and show a pending bubble that the
    // real LLM fills in — /api/ask answers grounded in this investigation's case.
    const baseMsgs=this.state.chatMsgs.concat([{role:'user',text:q},{role:'assistant',text:'Claude is thinking…',pending:true}]);
    const thinkingIdx=baseMsgs.length-1;
    // A follow-up is a deliberate user action that INTERRUPTS the intro grow: stop
    // the grow/step player (both timers + the _playing flag) AND clear the transient
    // reasoning overlay. Without reasoning:null, killing _timer mid-grow freezes the
    // last verb ("Pruning confounded branches…") on screen forever — the stuck bug.
    clearTimeout(this._timer); clearTimeout(this._revealTimer); this._playing=false;
    this.setState({ extra:this.state.extra.concat([node]), extraEdges:this.state.extraEdges.concat([['root',id,'gold','follow-up']]), chatMsgs:baseMsgs, chatDraft:'', railOpen:true, playing:false, reasoning:null });
    setTimeout(()=>this.animateTo(this.frameDetail(node,1.0,0)), 40);
    const setBubble=(text)=>this.setState(s=>{ const m=s.chatMsgs.slice(); if(m[thinkingIdx]) m[thinkingIdx]={role:'assistant',text}; return {chatMsgs:m}; });
    // Non-blocking POST to the repo-grounded Ask-Claude endpoint (real LLM, live iff
    // ANTHROPIC_API_KEY is set on the server). Pass the current hypothesis + live case
    // as context so answers cite this investigation's real numbers. 30s abort.
    let ctrl=null; try{ ctrl=(typeof AbortController!=='undefined')?new AbortController():null; }catch(e){}
    const to=setTimeout(()=>{ try{ ctrl&&ctrl.abort(); }catch(e){} }, 30000);
    const offline='I couldn’t reach the model. Start the server with ANTHROPIC_API_KEY set to get answers grounded in this investigation. (offline)';
    try {
      const body=JSON.stringify({ question:q, hypothesis:this.state.entryValue||'', case:this.heroCase()||null });
      fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body,signal:ctrl?ctrl.signal:undefined})
        .then(r=>r.ok?r.json():Promise.reject(new Error('http '+r.status)))
        .then(resp=>{
          clearTimeout(to);
          const ans=(resp&&resp.answer)||'';
          setBubble(ans || offline);
        })
        .catch(()=>{ clearTimeout(to); setBubble(offline); });
    } catch(e){ clearTimeout(to); setBubble(offline); }
  };

  chips = [
    { text:'p-tau217 predicts hippocampal atrophy', verdict:'3 biomarkers, 2 compounds' },
    { text:'GFAP astrocyte reactivity drives cortical thinning', verdict:'2 biomarkers, 4 experiments' },
    { text:'Amyloid PET burden precedes default-mode disruption', verdict:'1 confound killed, 2 targets' },
    { text:'Scanner field strength inflates atrophy estimates', verdict:'confound isolated' }
  ];
  onEntryKey=(e)=>{ if(e.key==='Enter'){ e.preventDefault(); this.onInvestigate(); } };
  growSeq = [
    { verb:'Reading the hypothesis…', add:['root'] },
    { verb:'Pulling the imaging cohort…', add:[] },
    { verb:'Fanning out candidate branches…', add:['syn','neuro','scan','vasc','age'] },
    { verb:'Running the confound gauntlet…', add:['synk','neurk','syn2','neur2','vasc2'] },
    { verb:'Pruning confounded branches…', add:['scand','aged'] },
    { verb:'Ranking biomarkers & experiments…', add:['cand1','cand2','cand3'] }
  ];
  growStep(idx){
    if(idx>=this.growSeq.length){
      this._justRevealed=null;
      this._timer=setTimeout(()=>{ this.setState({reasoning:null, showVerdict:true}); this.animateTo(this.overviewCam()); }, 900);
      return;
    }
    const st=this.growSeq[idx];
    const cur=(this.state.revealed||[]).slice();
    st.add.forEach(id=>{ if(cur.indexOf(id)<0) cur.push(id); });
    this._justRevealed = st.add.length?st.add[st.add.length-1]:this._justRevealed;
    this.setState({revealed:cur, reasoning:st.verb},()=>{ this.animateTo(this.overviewCam()); });
    this._timer=setTimeout(()=>this.growStep(idx+1), 1350);
  }
  onInvestigate=(seed)=>{
    if(typeof seed==='string' && seed) this.setState({entryValue:seed});
    // Fire the REAL investigate call, non-blocking (mirrors the /api/orchestrate
    // call in onChatSend). On success we overlay the live ExperimentCard so every
    // accessor lights up with real data; on error/timeout we do nothing, leaving
    // the real demo_data-backed view intact — no spinner, no synthetic.
    try {
      const hyp=(typeof seed==='string'&&seed)?seed:this.state.entryValue;
      let ctrl=null; try{ ctrl=(typeof AbortController!=='undefined')?new AbortController():null; }catch(e){}
      const to=setTimeout(()=>{ try{ ctrl&&ctrl.abort(); }catch(e){} }, 120000);  // real feeders (e.g. adni:neurojepa) run ~20-30s; graceful fallback to real demo_data on abort
      // Pass the chosen anchor so the backend routes the molecular follow-up to it
      // (amyloid/p_tau217/gfap/nfl). Only sent when the user explicitly anchored via
      // the composer — the default entry/chip path stays on cohort-dominance routing.
      const _body={hypothesis:hyp,dataset:this._investigateDataset(),seed:0};
      if(this.state.anchorFocus) _body.anchor=this.state.anchorFocus;
      fetch('/api/investigate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(_body),signal:ctrl?ctrl.signal:undefined})
        .then(r=>r.ok?r.json():Promise.reject(new Error('http '+r.status)))
        .then(result=>{ clearTimeout(to); if(result&&result.case){ this.setState({card:result},()=>{ this._applyCaseToTree(this.heroCase()); }); } })
        .catch((err)=>{ clearTimeout(to); this.setState({liveError:true}); console.warn('live investigate failed', err); });
    } catch(e){}
    clearTimeout(this._timer); clearTimeout(this._revealTimer);
    this._playing=false;
    this.setState({card:null, stage:'canvas', playing:false, pinned:null, showVerdict:false, stepIndex:0, revealed:['root'], reasoning:this.growSeq[0].verb});
    setTimeout(()=>{
      this.measure();
      this.setState({cam:this.frameDetail(this.nmap.root,1.15,0)});
      requestAnimationFrame(()=>this.animateTo(this.overviewCam()));
      this._timer=setTimeout(()=>this.growStep(1), 1200);
    }, 40);
  };

        el('div',{key:'q',style:{fontSize:'12px',color:C.ink2,margin:'3px 0 5px',lineHeight:1.35}},q),

  rankRow(rank, name, desc, score, opts){

      el('div',{key:'r',style:{flex:'0 0 22px',height:'22px',borderRadius:'6px',background:C.claySoft,color:C.clayDeep,fontSize:'12px',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}},rank),
      el('div',{key:'m',style:{flex:1}},[
        el('div',{key:'l',style:{display:'flex',justifyContent:'space-between',fontSize:'13px'}},[el('span',{key:'a'},nameRow),el('span',{key:'s',style:{fontFamily:'ui-monospace,SFMono-Regular,Menlo,Consolas,monospace',color:C.ink}},scoreLabel)]),

  expRow(title, tag, tagKind){

  storyEl(node){
    if(!node || !node.story) return null;
    const k=node.story;
    if(k==='cohort'){
      const co=this.heroCohort();
      if(!co) return null;
      return this.storyShell(node,'Cohort & datasets',[
        el('div',{key:'g',style:{fontSize:'13px',color:C.ink2,lineHeight:1.5,marginBottom:'10px'}},'Root of the investigation. Everything below inherits this provenance.'),
        null,
        el('div',{key:'grid',style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 12px'}},[
          this.kv('participants', co.n_subjects!=null?String(co.n_subjects):'—'),
          this.kv('sites', co.n_sites!=null?String(co.n_sites):'—'),
          this.kv('scanners', co.n_scanners!=null?String(co.n_scanners):'—'),
          this.kv('mean age', co.age_mean!=null?co.age_mean.toFixed(1):'—'),
        ]),
        this.disclaimer((co.substrate_line || co.note || 'Provenance bound to the source cohort — every downstream node inherits it.') + ' ' + this.provenanceNote())
      ]);

    if(k==='confound'){
      const c=this.heroCase(); const tests=(c&&c.tests)||[];
      const nPass=tests.filter(t=>t.result==='passed').length;
      const rows = tests.length
        ? tests.map(t=> this.checkRow(this._testMark(t.result), t.label, t.question, this._testDelta(t)))
        : [el('div',{key:'na',style:{fontSize:'12px',color:C.mute}},'Gauntlet not evaluated for this cohort.')];
      return this.storyShell(node,'Confound gauntlet — 5 tests',[

        this.disclaimer(tests.length? ('Passed '+nPass+'/'+tests.length+' — every mark and Δ comes from the referee on the loaded cohort.') : 'No gauntlet result available for this cohort.')
      ]);
    }
    if(k==='confound2'){
      const c=this.heroCase(); const t=(c&&c.tests||[]).find(x=>x.key==='brain_age');

      return this.storyShell(node,'Confound gauntlet — vascular',[

           : this.checkRow(this._testMark(t.result), t.label, t.question, this._testDelta(t)),

      ]);
    }
    if(k==='kill'||k==='kill2'){
      const isScan=k==='kill';
      const c=this.heroCase();
      const lk=(c&&c.leakage_margin)||{};
      const ageT=(c&&c.tests||[]).find(x=>x.key==='age_sex'); const ageS=(ageT&&ageT.stats)||{};
      const hypAuc = isScan ? (lk.outcome_auc!=null?lk.outcome_auc:0) : (ageS.auc_before!=null?ageS.auc_before:0);
      const cfAuc  = isScan ? (lk.scanner_auc!=null?lk.scanner_auc:0) : (ageS.auc_after!=null?ageS.auc_after:0);
      return this.storyShell(node, isScan?'Kill reason — scanner confound':'Kill reason — age confound',[
        el('div',{key:'g',style:{fontSize:'13px',color:C.ink,lineHeight:1.5,marginBottom:'12px'}}, isScan?'A classifier that only sees the scanner site predicts the outcome better than the hypothesis does. The signal is the machine, not the disease.':'Chronological age alone explains the atrophy at least as well as the biomarker. No disease-specific signal remains.'),
        el('div',{key:'a',style:{marginBottom:'9px'}},[ this.auc(isScan?'Hypothesis AUC':'Hypothesis AUC', hypAuc, C.green), this.auc(isScan?'Scanner-site classifier':'Age-only baseline', cfAuc, C.gray) ]),
        el('div',{key:'v',style:{fontSize:'12px',fontWeight:600,color:C.clayDeep,background:C.claySoft,padding:'8px 10px',borderRadius:'8px'}}, 'Confound ≥ signal → branch killed. Pruned from candidate generation.'),
        el('div',{key:'rec',style:{marginTop:'9px',fontSize:'12px',lineHeight:1.5,color:C.green,background:C.greenSoft,padding:'8px 10px',borderRadius:'8px'}}, [
          el('span',{key:'lbl',style:{fontWeight:600}},'Do this next — '),
          isScan
            ? 'harmonize the cohort with ComBat and re-run. If the signal survives once the scanner is removed, it is biology, not the machine.'
            : 'regress out brain-age and anchor to plasma p-tau217 before re-testing. A molecular anchor is what separates disease from generic aging.'
        ]),
        this.disclaimer('Killed branches stay visible (gray, dashed) so the reasoning is auditable — not hidden.')
      ]);
    }
    if(k==='iterate'){
      const c=this.heroCase();
      const atn=c&&c.atn_profile;
      let gfap=(atn&&atn.I_gfap_r!=null)?atn.I_gfap_r:null;
      if(gfap==null){ const t=(c&&c.tests||[]).find(x=>x.key==='biomarker_anchor'); if(t&&t.stats&&t.stats.gfap_r!=null) gfap=t.stats.gfap_r; }
      return this.storyShell(node,'Iterated offshoot',[
        el('div',{key:'g',style:{fontSize:'13px',color:C.ink2,lineHeight:1.5,marginBottom:'10px'}},'p-tau217 alone was underpowered here, so Claude re-anchored the branch to GFAP astrocyte reactivity and re-checked the anchor.'),
        gfap!=null ? el('div',{key:'a'},[ this.auc('GFAP astrocyte anchor · r', gfap, C.green) ])
                   : el('div',{key:'na',style:{fontSize:'12px',color:C.mute}},'GFAP re-anchor not evaluated for this cohort.'),
        this.disclaimer('A follow-up question spawns exactly this kind of gold offshoot — try the Claude · ask rail.')
      ]);
    }
    if(k==='proteins'){
      const tx=this.heroTx();
      if(tx){
        // Finding-level measured significance (AUROC + CI), read from the case — the
        // ranking DERIVES from this imaging finding. Per-protein AUROC does not exist
        // (those are PI4AD priority scores), so significance shows ONCE, here, not per row.
        const c=this.heroCase()||{}; const lm=c.leakage_margin||{};

        ]) : null;
        const targets=(tx.ranked_targets||[]);
        const rows=targets.map((t,i)=> this.rankRow(
          String(i+1), t.gene, this.shortDesc(t)+(t.rank!=null?(' · PI4AD #'+t.rank):''), t.priority_score,
          { frac: (t.priority_score!=null? Math.max(0,Math.min(1,t.priority_score/10)) : 0) }
        ));
        return this.storyShell(node,'Ranked protein targets',[
          sigHeader,
          el('div',{key:'g',style:{fontSize:'12px',color:C.ink2,marginBottom:'12px'}},"Ranked by PI4AD's precomputed AD-target priority (0–10) — an external snapshot; the finding selects the mechanism class, not the ordering. Hypotheses to test, not validated targets."),
          ...rows,
          el('div',{key:'ph',style:{marginTop:'12px',padding:'9px 10px',background:C.paper2,border:'1px solid '+C.edge,borderRadius:'8px',fontSize:'11.5px',color:C.ink2,lineHeight:1.45}},'3D structure, AUROC & AlphaFold DB links → open the Protein data tab.'),
          this.disclaimer('Candidate targets to test — not validated.')
        ]);
      }
      return null;
    }
    if(k==='compounds'){

  buildScene(){

      el('filter',{key:'sh',id:'nodeShadow',x:'-60%',y:'-60%',width:'220%',height:'220%'},[

      el('radialGradient',{key:'gd',id:'goldGrad',cx:'38%',cy:'32%',r:'75%'},[el('stop',{key:'a',offset:'0%',stopColor:'#e0ab3a'}),el('stop',{key:'b',offset:'100%',stopColor:C.gold})]),
      el('radialGradient',{key:'cg',id:'clayGrad',cx:'40%',cy:'34%',r:'80%'},[el('stop',{key:'a',offset:'0%',stopColor:'#fbe6dc'}),el('stop',{key:'b',offset:'100%',stopColor:C.claySoft})])
    ]));

      const a=nm[e[0]], b=nm[e[1]]; if(!a||!b) return;

      const mx=(a.x+b.x)/2;
      const d=`M ${a.x} ${a.y} C ${mx} ${a.y}, ${mx} ${b.y}, ${b.x} ${b.y}`;

    });
    this.visNodes().forEach(n=>{

      const g=[];

        g.push(el('text',{key:'g',x:n.x,y:n.y,fill:C.clayDeep,fontSize:22,textAnchor:'middle',dominantBaseline:'central'},'⌾'));
      } else if(dead){

      } else {
        const grad = n.role==='green'?'url(#grnGrad)':'url(#goldGrad)';

  buildOverlay(){
    const c=this.state.cam; const out=[]; const showing=new Set();
    const inView=(sx,sy,m)=> sx>-(m||360) && sx<this.W+(m||60) && sy>-120 && sy<this.H+120;
    // story blocks
    if(c.scale>=0.96){
      this.visNodes().forEach(n=>{
        if(!n.story) return;
        const [sx,sy]=this.project(n.x,n.y); if(!inView(sx,sy,360)) return;
        const r=(RADIUS[n.role]||18)*c.scale;
        const est = this.storyEl(n); if(!est) return;
        showing.add(n.id);
        out.push(el('div',{key:'s'+n.id,'data-story':'1',style:{position:'absolute',left:(sx+r+16)+'px',top:(sy-24)+'px',pointerEvents:'auto',zIndex:12}}, est));
      });
    }
    // node labels
    if(c.scale>=0.5){
      this.visNodes().forEach(n=>{
        if(showing.has(n.id)) return;
        const [sx,sy]=this.project(n.x,n.y); if(!inView(sx,sy,80)) return;
        const r=(RADIUS[n.role]||18)*c.scale; const dead=n.role==='gray';
        const accent = n.role==='clay'?C.clayDeep : n.role==='green'?C.green : n.role==='gold'?C.gold : n.role==='root'?C.ink : C.mute;
        out.push(el('div',{key:'l'+n.id,style:{position:'absolute',left:sx+'px',top:(sy+r+7)+'px',transform:'translateX(-50%)',textAlign:'center',pointerEvents:'none',opacity:dead?0.72:1,zIndex:8,width:'160px'}},[
          el('div',{key:'a',style:{fontSize:'14px',fontWeight:600,color:accent,lineHeight:1.2,textShadow:'0 1px 2px '+C.paper2}},n.label),
          n.sub?el('div',{key:'b',style:{fontSize:'12px',color:C.mute,marginTop:'1px',fontFamily:/AUC|0\.|n$/.test(n.sub)?'ui-monospace,SFMono-Regular,Menlo,Consolas,monospace':'inherit'}},n.sub):null,

        ]));

    if(c.scale>=0.55){

      this.visEdges().forEach((e,i)=>{ if(!e[3]) return; const a=nm[e[0]],b=nm[e[1]]; if(!a||!b) return; const [sx,sy]=this.project((a.x+b.x)/2,(a.y+b.y)/2); if(!inView(sx,sy,60)) return;

      });

    return out;

  buildMini(){
    const MW=196,MH=140,pad=12;
    const b=this.bbox();
    const s=Math.min((MW-pad*2)/b.w,(MH-pad*2)/b.h);
    const ox=pad+(MW-pad*2-b.w*s)/2 - b.x0*s;
    const oy=pad+(MH-pad*2-b.h*s)/2 - b.y0*s;
    this._mini={s,ox,oy};
    const out=[];
    this.visEdges().forEach((e,i)=>{ const nm=this.nmap; const a=nm[e[0]],bb=nm[e[1]]; if(!a||!bb)return; out.push(el('line',{key:'ml'+i,x1:a.x*s+ox,y1:a.y*s+oy,x2:bb.x*s+ox,y2:bb.y*s+oy,stroke:C.edge2,strokeWidth:1})); });
    this.visNodes().forEach(n=>{ const col=n.role==='clay'?C.clay:n.role==='root'?C.clayDeep:FILL[n.role]||C.gray; out.push(el('circle',{key:'m'+n.id,cx:n.x*s+ox,cy:n.y*s+oy,r:n.role==='clay'?4:3,fill:col,opacity:n.role==='gray'?0.5:1})); });
    // viewport rect
    const c=this.state.cam;
    const vx0=(c.cx-(this.W/2)/c.scale)*s+ox, vy0=(c.cy-(this.H/2)/c.scale)*s+oy;
    const vw=(this.W/c.scale)*s, vh=(this.H/c.scale)*s;
    out.push(el('rect',{key:'vp',x:vx0,y:vy0,width:vw,height:vh,fill:'rgba(201,100,66,.08)',stroke:C.clay,strokeWidth:1.2,rx:2}));
    return out;
  }
  onMiniClick=(e)=>{
    if(!this._mini) return; const r=e.currentTarget.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    const wx=(mx-this._mini.ox)/this._mini.s, wy=(my-this._mini.oy)/this._mini.s;
    this.setState({playing:false}); clearTimeout(this._timer);
    this.animateTo({cx:wx,cy:wy,scale:Math.max(this.state.cam.scale,0.7)});
  };

  renderVals(){
    const st=this.state;
    const chat=st.chatMsgs.map((m,i)=>({ text:m.text, wrap:{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}, bubble:{maxWidth:'85%',fontSize:'13px',lineHeight:1.5,padding:'10px 12px',borderRadius:'12px',background:m.role==='user'?C.clay:C.paper2,color:m.role==='user'?'#fff':C.ink} }));
    const c=st.cam;
    const camTransform=`translate(${this.W/2},${this.H/2}) scale(${c.scale}) translate(${-c.cx},${-c.cy})`;
    const pinnedNode = st.pinned?this.nmap[st.pinned]:null;

    return {
      isEntry: st.stage==='entry',
      entryValue: st.entryValue,
      setEntry: this.setEntry,
      onInvestigate: this.onInvestigate,
      investHover:{background:C.clayDeep},
      onEntryKey: this.onEntryKey,
      chips: this.chips.map(c=>({

        onLaunch:()=>this.onInvestigate(c.text),
        style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px',textAlign:'left',background:'transparent',border:'none',borderRadius:'8px',padding:'11px 12px',cursor:'pointer',transition:'background .12s'},
        styleHover:{background:C.paper2}
      })),

      onHome:this.onHome,
      showVerdict: st.showVerdict,
      verdictCounts: this.verdictCounts(),
      killedBranches: this.killedCount(),
      onDismissVerdict: this.onDismissVerdict,
      onOpenTop: this.onOpenTop,
      verdictLede: 'From “'+(st.entryValue||'your hypothesis')+'” — confounds cleared, survivors ranked into testable next steps.',

      railStyle:{flex:'0 0 auto',width:st.railOpen?'300px':'0px',overflow:'hidden',background:C.card,borderRight:st.railOpen?'1px solid '+C.edge:'none',display:'flex',flexDirection:'column',transition:'width .28s cubic-bezier(.2,.7,.2,1)',zIndex:35},
      handleStyle:{position:'absolute',left:'20px',bottom:'20px',display:st.railOpen?'none':'flex',alignItems:'center',gap:'8px',fontSize:'13px',fontWeight:500,letterSpacing:'-.005em',color:'#fff',background:C.clay,border:'none',borderRadius:'100px',padding:'11px 18px',cursor:'pointer',boxShadow:'0 6px 22px rgba(201,100,66,.28)',zIndex:24},
      toggleRail:this.toggleRail,
      chatMsgs:chat, chatDraft:st.chatDraft, setChatDraft:this.setChatDraft, onChatSend:this.onChatSend, onChatKey:this.onChatKey,
      composerOpen:st.composerOpen, composerBiomarker:st.composerBiomarker, composerDraft:st.composerDraft,
      composerNoPlasma: st.substrate==='oasis',
      toggleComposer:this.toggleComposer, setComposerBiomarker:this.setComposerBiomarker, setComposerDraft:this.setComposerDraft, onComposerKey:this.onComposerKey, onComposerSubmit:this.onComposerSubmit,

      setCanvas:this.setCanvas,
      camTransform,

      overlayEls:this.buildOverlay(),
      miniEls:this.buildMini(),
      onMiniClick:this.onMiniClick,


      hintStyle:{position:'absolute',left:'50%',top:'20px',transform:'translateX(-50%)',display:(st.stage!=='entry'&&!st.pinned&&!st.playing&&!st.reasoning&&!st.showVerdict)?'flex':'none',alignItems:'center',gap:'9px',background:'rgba(255,255,255,.72)',backdropFilter:'saturate(180%) blur(20px)',WebkitBackdropFilter:'saturate(180%) blur(20px)',border:'1px solid rgba(230,227,216,.8)',borderRadius:'100px',padding:'9px 16px',fontSize:'13px',color:C.ink2,boxShadow:'0 4px 20px rgba(40,36,28,.07)',zIndex:20,whiteSpace:'nowrap'},
      reasonText: st.reasoning||'',
      reasonStyle:{position:'absolute',left:'50%',top:'20px',transform:'translateX(-50%)',display:(st.stage!=='entry'&&st.reasoning)?'flex':'none',alignItems:'center',gap:'11px',background:'rgba(255,255,255,.72)',backdropFilter:'saturate(180%) blur(20px)',WebkitBackdropFilter:'saturate(180%) blur(20px)',border:'1px solid rgba(230,227,216,.8)',borderRadius:'100px',padding:'9px 18px',boxShadow:'0 4px 22px rgba(40,36,28,.09)',zIndex:22,whiteSpace:'nowrap'},
      pinned: !!st.pinned,
      drawerTitle: pinnedNode?pinnedNode.label:'',
      drawerTabs: pinnedNode?this.buildTabs(pinnedNode):[],
      drawerEl: pinnedNode?this.drawerContent(pinnedNode):null,
      onCloseDrawer:this.onCloseDrawer
    };
  }
}
