narration: "The claim \u201CMCI patients who convert to AD show a distinct structural-MRI\
  \ signature in their frozen embeddings versus non-converters.\u201D lands at \u201C\
  strong candidate\u201D (88/100). The naive effect (AUC 0.71 separating MCI converters\
  \ from MCI non-converters) is real on paper, but the referee's job is to ask what\
  \ else could produce it. It cleared the gauntlet's promotion floor: the effect exceeds\
  \ the scanner-prediction floor on subject-disjoint splits and is worth a confirmatory\
  \ follow-up \u2014 as a hypothesis, not a settled result. Where it stops being true:\
  \ that the scanner/site mix in any new cohort matches this one \u2014 the leakage\
  \ margin is only +0.04 AUC, so a different scanner distribution could erase the\
  \ effect. That the same frozen embeddings can predict scanner/site as well as outcome\
  \ is documented prior art (\u201CBatch Effects in Brain Foundation Model Embeddings,\u201D\
  \ arXiv:2604.14441 (2026)); NeuroAD Discovery Engine only runs the audit and issues\
  \ the verdict."
adjudication:
  prosecution: "The claim that frozen Neuro-JEPA structural embeddings separate MCI\
    \ converters from MCI non-converters does not survive scrutiny. The subject-disjoint\
    \ leakage margin is only +0.04 AUC \u2014 the same head predicts the scanner nearly\
    \ as well as the outcome, exactly the batch-effect mechanic reported in 'Batch\
    \ Effects in Brain Foundation Model Embeddings' (arXiv:2604.14441 (2026)). It\
    \ failed or weakened under: Site / scanner leakage (weakened). The parsimonious\
    \ reading is an acquisition/aging artifact until an orthogonal molecular anchor\
    \ says otherwise."
  defense: "The signal separating MCI converters from MCI non-converters is consistent\
    \ with real disease biology. It withstood: Age / sex adjustment, Brain-age control,\
    \ Biomarker anchor, Replication split. Critically, it is anchored to a plasma\
    \ p-tau217 / GFAP correlation on the complete subset (r=0.40) \u2014 molecular\
    \ pathology, not pixels."
  judge_reasoning: "Robustness score 88/100 places this finding at 'strong candidate'.\
    \ The +0.04 AUC leakage margin is the deciding fact: the prosecution's artifact\
    \ reading is the more defensible one. The finding meets the promotion floor and\
    \ may proceed to the biomarker-gated biology step \u2014 as a hypothesis to test,\
    \ not a conclusion to bank."
reviewer:
  critique:
  - "A \u2018strong candidate\u2019 verdict is a licence to follow up, not to conclude\
    \ \u2014 the referee promotes hypotheses, it does not confirm them."
  - 'The brain-age control is a proxy, not a gold standard: it is embedding-derived
    (this cohort''s fit: R2=0.78, MAE=2.9yr), so residual generic-aging signal can
    survive the adjustment and masquerade as disease-specific.'
  - The biomarker anchor likely rests on a partial complete-case subset; with realistic
    p-tau217 missingness the correlation is estimated on far fewer subjects than the
    headline cohort.
  - "N is small (~130); at this size AUCs are noisy and a single site's idiosyncrasy\
    \ can dominate \u2014 treat effect sizes as wide-interval estimates."
  - "The leakage test audits the embeddings with the same linear-probe family it uses\
    \ for the outcome, so it bounds \u2014 but cannot fully rule out \u2014 shared\
    \ confounding; this is the mechanic quantified in \u2018Pretrained, Frozen, Still\
    \ Leaking\u2019 (arXiv:2606.09189 (2026)), which we cite rather than claim."
  revised_caveats:
  - Verdict is provisional and conditional on the scanner/site distribution of any
    replication cohort.
  - Brain-age adjustment uses a proxy control; residual aging signal cannot be excluded.
  - Any biomarker anchor is complete-case only and may not generalize.
  - "Leakage is bounded, not eliminated \u2014 see the published batch-effect audits\
    \ (\u2018Batch Effects in Brain Foundation Model Embeddings,\u2019 arXiv:2604.14441\
    \ (2026))."
  - Promotion authorizes one confirmatory experiment, not adoption of the finding.
