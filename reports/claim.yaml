# REAL ADNI — refereed survivor over a real cohort.
# The leakage-margin CI note below travels with the verdict.
badge: REAL ADNI
provenance: "REAL ADNI \u2014 refereed survivor (real cohort)."
claim:
  claim_id: ADNI-A
  claim_text: AD vs CN diagnosis is decodable from the full ComBat-harmonized ADNI
    cohort.
  target: dx_binary
  group_a: AD
  group_b: CN
  substrate: ADNI FreeSurfer features, ComBat-harmonized (weight-free feeder)
  head: linear probe
naive_effect:
  metric: AUC
  value: 0.925
  value_adjusted: 0.905
  adjusted_note: age/sex-residualized (fold-honest)
  target: dx_binary
  n: 1615
  head: linear probe
  substrate: ADNI z-standardized FreeSurfer morphometry (UCSFFSX7 ST regions; weight-free
    feeder)
  value_note: fold-honest ComBat (batch params fit on train rows per fold); whole-cohort
    ComBat differs by <0.003 AUC
leakage_margin:
  outcome_auc: 0.922
  outcome_auc_icv_adj: null
  icv_adjusted: false
  scanner_auc: 0.374
  margin: 0.549
  confound: scanner
  outcome_ci:
  - 0.9061
  - 0.9383
  scanner_ci:
  - 0.3531
  - 0.3948
  outcome_p_perm: 0.001
  scanner_p_perm: 1.0
  outcome_q: 0.002
  scanner_q: 1.0
  margin_q: 0.002
  scanner_ci_excludes_chance: false
  margin_ci_lo: 0.522
  margin_ci_hi: 0.575
  margin_p: 0.001
  margin_ci_excludes_zero: true
  field_strength_invariance:
    confound: scanner
    pooled_auc: 0.9225
    strata:
    - level: 3T
      auc: 0.9253
      n: 1193
    - level: 1.5T
      auc: 0.9351
      n: 422
    max_abs_delta: 0.0126
    band: 0.05
    within_band: true
leakage_margin_note: Leakage-margin 95% CI 0.522..0.575 (excludes zero).
verdict: strong candidate
score: 100
promoted: true
caveats:
- "p-tau217 measured on a partial subset (~45% missing in a realistic cohort) \u2014\
  \ anchor is suggestive, not confirmatory."
- Verdict is provisional and conditional on the scanner/site distribution of any replication
  cohort.
- Brain-age adjustment uses a proxy control; residual aging signal cannot be excluded.
- Any biomarker anchor is complete-case only and may not generalize.
- "Leakage is bounded, not eliminated \u2014 see the published batch-effect audits\
  \ (\u2018Batch Effects in Brain Foundation Model Embeddings,\u2019 arXiv:2604.14441\
  \ (2026))."
- Promotion authorizes one confirmatory experiment, not adoption of the finding.
- "A \u2018strong candidate\u2019 verdict is a licence to follow up, not to conclude\
  \ \u2014 the referee promotes hypotheses, it does not confirm them."
- 'The brain-age control is a proxy, not a gold standard: it is embedding-derived
  (this cohort''s fit: R2=0.48, MAE=4.0yr), so residual generic-aging signal can survive
  the adjustment and masquerade as disease-specific.'
- The biomarker anchor likely rests on a partial complete-case subset; with realistic
  p-tau217 missingness the correlation is estimated on far fewer subjects than the
  headline cohort.
- "Confirm the effective sample size per split \u2014 subject-disjoint cross-validation\
  \ on a modest cohort leaves each fold thin."
- "The leakage test audits the embeddings with the same linear-probe family it uses\
  \ for the outcome, so it bounds \u2014 but cannot fully rule out \u2014 shared confounding;\
  \ this is the mechanic quantified in \u2018Pretrained, Frozen, Still Leaking: Auditing\
  \ Cross-Encoder Attribute Transfer in EEG Foundation Models\u2019 (arXiv:2606.09189\
  \ (2026)), which we cite rather than claim."
- "ComBat is fit fold-honestly (train-only per CV fold), not on the whole cohort \u2014\
  \ the displayed AD-vs-CN AUC is not inflated by harmonization leakage."
