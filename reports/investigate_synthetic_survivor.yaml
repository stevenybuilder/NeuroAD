verdict: robust enough for follow-up
promoted: true
biology_hypothesis: "Survivor \u201CDoes the embedding predict MCI to AD conversion?\u201D\
  \ routes to a amyloid-cascade (tau-driven) mechanism, keyed on p-tau217 and amyloid\
  \ positivity. Plasma p-tau217: among the strongest blood AD biomarkers. AD-vs-CU\
  \ AUC ~0.93-0.98; MCI-vs-CU ~0.94. Correlation with a structural probe score is\
  \ MODEST (r~0.3-0.55), not redundant. SUPPORTED. The structural probe is read as\
  \ a downstream imaging correlate of that molecular process, not an independent discovery."
next_experiment:
- 'Cohort: ADNI-3 / EPAD.'
- 'Target N: ~120 complete-case subjects with the routing biomarker.'
- 'Direction: the structural probe score should track plasma p-tau217 (expected r~0.3-0.55,
  modest not redundant) and be enriched in amyloid-positive subjects.'
- 'Kill criterion: if the probe score shows no p-tau217 correlation (r<0.2) on the
  complete-case subset, the amyloid-cascade routing is wrong.'
falsification:
- if the probe score shows no p-tau217 correlation (r<0.2) on the complete-case subset,
  the amyloid-cascade routing is wrong.
- If the probe score's biomarker correlation disappears after residualizing against
  a scanner-predicting direction, the survivor was leakage after all.
- If a held-out cohort fails to reproduce the effect (drop below the promotion floor),
  the mechanism claim is withdrawn.
caveats:
- "SYNTHETIC HARNESS: the p-tau217 / GFAP anchor is a CALIBRATION TARGET (drawn to\
  \ sit inside a literature range in calibration.CAL), not a measured plasma value\
  \ \u2014 no open cohort pairs MRI with plasma markers. The molecular anchor demonstrates\
  \ the gate MECHANIC, not a real result."
- "p-tau217 measured on a partial subset (~45% missing in a realistic cohort) \u2014\
  \ anchor is suggestive, not confirmatory."
- Verdict is provisional and conditional on the scanner/site distribution of any replication
  cohort.
- Brain-age adjustment uses a proxy control; residual aging signal cannot be excluded.
- Any biomarker anchor is complete-case only and may not generalize.
- "Leakage is bounded, not eliminated \u2014 see the published batch-effect audits\
  \ (\u2018Batch Effects in Brain Foundation Model Embeddings,\u2019 arXiv:2604.14441\
  \ (2026))."
- Promotion authorizes one confirmatory experiment, not adoption of the finding.
- "A \u2018robust enough for follow-up\u2019 verdict is a licence to follow up, not\
  \ to conclude \u2014 the referee promotes hypotheses, it does not confirm them."
- 'The brain-age control is a proxy, not a gold standard: it is embedding-derived
  (this cohort''s fit: R2=0.78, MAE=2.9yr), so residual generic-aging signal can survive
  the adjustment and masquerade as disease-specific.'
- The biomarker anchor likely rests on a partial complete-case subset; with realistic
  p-tau217 missingness the correlation is estimated on far fewer subjects than the
  headline cohort.
- "N is small (~130); at this size AUCs are noisy and a single site's idiosyncrasy\
  \ can dominate \u2014 treat effect sizes as wide-interval estimates."
- "The leakage test audits the embeddings with the same linear-probe family it uses\
  \ for the outcome, so it bounds \u2014 but cannot fully rule out \u2014 shared confounding;\
  \ this is the mechanic quantified in \u2018Pretrained, Frozen, Still Leaking: Auditing\
  \ Cross-Encoder Attribute Transfer in EEG Foundation Models\u2019 (arXiv:2606.09189\
  \ (2026)), which we cite rather than claim."
