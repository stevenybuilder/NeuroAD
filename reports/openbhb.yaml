narration: "The claim \u201Cscanner is decodable from OpenBHB structural features\u201D\
  \ lands at \u201Cfragile\u201D (38/100). The naive effect (AUC 0.89 separating scanner\
  \ A from scanner B) is real on paper, but the referee's job is to ask what else\
  \ could produce it. It sits below the promotion floor, so the honest read is that\
  \ acquisition, demographics or generic aging can plausibly account for it, and it\
  \ should not consume a scientist's quarter without stronger evidence. Where it stops\
  \ being true: that the scanner/site mix in any new cohort matches this one \u2014\
  \ the leakage margin is only +0.00 AUC, so a different scanner distribution could\
  \ erase the effect. That the same frozen embeddings can predict scanner/site as\
  \ well as outcome is documented prior art (\u201CBatch Effects in Brain Foundation\
  \ Model Embeddings,\u201D arXiv:2604.14441 (2026)); NeuroAD Discovery Engine only\
  \ runs the audit and issues the verdict."
reviewer:
  critique:
  - 'The brain-age control is a proxy, not a gold standard: it is embedding-derived
    (this cohort''s fit: R2=0.60, MAE=6.3yr), so residual generic-aging signal can
    survive the adjustment and masquerade as disease-specific.'
  - "There is no usable plasma p-tau217 / GFAP anchor here, so the molecular gate\
    \ is unmet \u2014 the finding rests on imaging alone."
  - "Confirm the effective sample size per split \u2014 subject-disjoint cross-validation\
    \ on a modest cohort leaves each fold thin."
  - "The leakage test audits the embeddings with the same linear-probe family it uses\
    \ for the outcome, so it bounds \u2014 but cannot fully rule out \u2014 shared\
    \ confounding; this is the mechanic quantified in \u2018Pretrained, Frozen, Still\
    \ Leaking: Auditing Cross-Encoder Attribute Transfer in EEG Foundation Models\u2019\
    \ (arXiv:2606.09189 (2026)), which we cite rather than claim."
  revised_caveats:
  - Verdict is provisional and conditional on the scanner/site distribution of any
    replication cohort.
  - Brain-age adjustment uses a proxy control; residual aging signal cannot be excluded.
  - Any biomarker anchor is complete-case only and may not generalize.
  - "Leakage is bounded, not eliminated \u2014 see the published batch-effect audits\
    \ (\u2018Batch Effects in Brain Foundation Model Embeddings,\u2019 arXiv:2604.14441\
    \ (2026))."
